<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kayle Park</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Fraunces:ital,wght@0,700;0,900;1,700;1,900&display=swap" />
  <style>
    .landing-hero {
      padding: 5rem 2rem 3rem;
      max-width: 900px;
      margin: 0 auto;
      overflow: visible;
    }

    .landing-hero .hi {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .landing-hero h1 {
      font-family: 'Bungee Shade', sans-serif;
      font-weight: 400;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 1.2;
      overflow: visible;
      margin-bottom: 2.5rem;
    }

    .landing-hero h1 span {
      display: inline-block;
      background: linear-gradient(135deg, #3a2a14 0%, #7a4a28 25%, #4a7a9b 50%, #6ab8d8 75%, #7a4a28 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 6s ease-in-out infinite;
    }

    .landing-hero h1 .space {
      width: 0.3em;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .landing-hero .intro {
      font-size: 1.2rem;
      line-height: 1.7;
      color: #4a3828;
      max-width: 620px;
      margin-bottom: 1.2rem;
      font-weight: 400;
    }

    .landing-hero .intro em {
      font-style: italic;
      font-weight: 700;
      color: var(--text);
    }

    .landing-hero .current {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
      max-width: 580px;
      margin-bottom: 0;
      font-weight: 300;
    }

  </style>
</head>
<body>

  <div class="landing-hero">
    <p class="hi">Hi, I'm</p>
    <h1><span style="animation-delay:0s">K</span><span style="animation-delay:0.15s">a</span><span style="animation-delay:0.3s">y</span><span style="animation-delay:0.45s">l</span><span style="animation-delay:0.6s">e</span><span class="space"> </span><span style="animation-delay:0.9s">P</span><span style="animation-delay:1.05s">a</span><span style="animation-delay:1.2s">r</span><span style="animation-delay:1.35s">k</span></h1>

    <p class="intro">
      I <em>[what you do]</em>, <em>[another thing you do]</em>,
      and <em>[one more thing]</em>.
    </p>

    <p class="current">
      [A sentence or two about what you're currently up to — your job, a project,
      where you're based. Keep it casual and specific.]
    </p>
  </div>

  <footer>
    <div class="footer-nav">
      <a href="index.html">About</a>
      <a href="writing.html">Writing</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="footer-social">
      <a href="https://www.linkedin.com/in/kayle-park-83a236203/" target="_blank">LinkedIn</a>
      <a href="https://x.com/kaylepark31" target="_blank">X</a>
      <a href="https://www.instagram.com/kayle_park" target="_blank">Instagram</a>
      <a href="https://www.instagram.com/kaylesfilm" target="_blank">Film</a>
    </div>
  </footer>

  <canvas id="sand"></canvas>
  <script>
    (function() {
      const canvas = document.getElementById('sand');
      const ctx = canvas.getContext('2d');
      let w, h, time = 0;

      // Simplex-inspired noise
      function noise(x, y, z) {
        const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
        x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
        const u = fade(x), v = fade(y), w2 = fade(z);
        const A = (X * 131 + Y * 17 + Z * 7) & 255;
        const B = ((X+1) * 131 + Y * 17 + Z * 7) & 255;
        const C = (X * 131 + (Y+1) * 17 + Z * 7) & 255;
        const D = ((X+1) * 131 + (Y+1) * 17 + Z * 7) & 255;
        const E = (X * 131 + Y * 17 + (Z+1) * 7) & 255;
        const F = ((X+1) * 131 + Y * 17 + (Z+1) * 7) & 255;
        const G = (X * 131 + (Y+1) * 17 + (Z+1) * 7) & 255;
        const H = ((X+1) * 131 + (Y+1) * 17 + (Z+1) * 7) & 255;
        return lerp(w2,
          lerp(v, lerp(u, grad(A,x,y,z), grad(B,x-1,y,z)),
                  lerp(u, grad(C,x,y-1,z), grad(D,x-1,y-1,z))),
          lerp(v, lerp(u, grad(E,x,y,z-1), grad(F,x-1,y,z-1)),
                  lerp(u, grad(G,x,y-1,z-1), grad(H,x-1,y-1,z-1)))
        );
      }
      function fade(t) { return t*t*t*(t*(t*6-15)+10); }
      function lerp(t,a,b) { return a + t*(b-a); }
      function grad(hash,x,y,z) {
        const h = hash & 15;
        const u = h < 8 ? x : y;
        const v = h < 4 ? y : (h===12||h===14 ? x : z);
        return ((h&1)===0 ? u : -u) + ((h&2)===0 ? v : -v);
      }

      function fbm(x, y, z) {
        let val = 0, amp = 0.5;
        for (let i = 0; i < 5; i++) {
          val += amp * noise(x, y, z);
          x *= 2.0; y *= 2.0; z *= 2.0;
          amp *= 0.5;
        }
        return val;
      }

      // Color palette: warm browns to cool blues
      function getColor(n) {
        n = n * 0.5 + 0.5; // normalize to 0-1
        const colors = [
          [235,228,218], // light cream
          [210,190,165], // warm sand
          [160,130,100], // brown
          [122,74,40],   // deep brown
          [74,122,155],  // slate blue
          [106,184,216], // light blue
          [180,212,232], // pale blue
          [235,228,218]  // back to cream
        ];
        const t = n * (colors.length - 1);
        const i = Math.min(Math.floor(t), colors.length - 2);
        const f = t - i;
        return [
          colors[i][0] + f * (colors[i+1][0] - colors[i][0]),
          colors[i][1] + f * (colors[i+1][1] - colors[i][1]),
          colors[i][2] + f * (colors[i+1][2] - colors[i][2])
        ];
      }

      const scale = 3;
      let imgData;

      function resize() {
        w = canvas.width = Math.ceil(window.innerWidth / scale);
        h = canvas.height = Math.ceil(window.innerHeight / scale);
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        imgData = ctx.createImageData(w, h);
      }

      function draw() {
        time += 0.003;
        const data = imgData.data;
        for (let y2 = 0; y2 < h; y2++) {
          for (let x2 = 0; x2 < w; x2++) {
            const nx = x2 / w * 4;
            const ny = y2 / h * 4;
            const warp = fbm(nx + 1.7, ny + 9.2, time) * 1.5;
            const n = fbm(nx + warp, ny + warp * 0.8, time * 0.7);
            const c = getColor(n);
            const idx = (y2 * w + x2) * 4;
            data[idx] = c[0];
            data[idx+1] = c[1];
            data[idx+2] = c[2];
            data[idx+3] = 50;
          }
        }
        ctx.putImageData(imgData, 0, 0);
        requestAnimationFrame(draw);
      }

      resize();
      draw();
      window.addEventListener('resize', resize);
    })();
  </script>

</body>
</html>
